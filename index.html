  <body>
    <header>
      <!-- -------------------------------NAV BAR-------------------------------------->
      <nav class="navbar navbar-expand-lg" id="navbar">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img src="img/icon.png" width="40px" /> LibriFlow
          </a>
          <button

            data-bs-target="#navbarSupportedContent"

            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" href="#" id="linkNavegacao"
                  >Início</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#" id="linkNavegacao">Sobre nós</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#" id="linkNavegacao">Onde estamos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#" id="linkNavegacao"
                  >Livros disponíveis</a
                >
              </li>
            </ul>

            <div class="nav-item dropdown me-3">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="bi bi-circle-half me-2"></i>Tema
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <a
                    class="dropdown-item d-flex align-items-center"
                    href="#"
                    id="temaLight"
                  >
                    <i class="bi bi-sun-fill me-2"></i>Light
                  </a>
                </li>
                <li>
                  <a
                    class="dropdown-item d-flex align-items-center"
                    href="#"
                    id="temaDark"
                  >
                    <i class="bi bi-moon-stars-fill me-2"></i>Dark
                  </a>
                </li>
              </ul>
            </div>

            <form class="d-flex" role="search">
              <input
                id="searchBar"
                class="form-control me-2"
                type="search"
                placeholder="Pesquisar"
              />
              <button class="btn btn-outline-light" type="submit">
                Buscar
              </button>
            </form>
          </div>
        </div>
      </nav>
      <!-- -------------------------------FIM NAV BAR-------------------------------------->
    </header>
    <main>
      <div class="box-titulo">
        <h1 class="text-center">A maior livraria de Portugal</h1>
        <h4 class="text-center">
          Filtre os livros por disciplina, localização e ano de publicação.
        </h4>
      </div>
      <!-- --------------------------------------------FILTRO ANO-------------------------------------------->
      <div class="container">
        <div class="row mb-4">
          <div class="col-md-4">
            <select
              class="form-select"
              aria-label="Default select example"
              id="FiltroAno"
            >
              <option selected>Todos os anos</option>
              <option value="1">5° Ano</option>
              <option value="2">6° Ano</option>
              <option value="3">7° Ano</option>
              <option value="4">8° Ano</option>
              <option value="5">9° Ano</option>
              <option value="6">10° Ano</option>
              <option value="7">11° Ano</option>
              <option value="8">12° Ano</option>
            </select>
            <!-- --------------------------------------------FILTRO DISCIPLINA-------------------------------------------->
            <select
              class="form-select"
              aria-label="Default select example"
              id="FiltroDisciplina"
            >
              <option selected>Todos as Disciplinas</option>
              <option value="1">Biologia</option>
              <option value="2">Ciências Naturais</option>
              <option value="3">Educação Física</option>
              <option value="4">Filosofia</option>
              <option value="5">Físico-Química</option>
              <option value="6">Geografia</option>
              <option value="7">História</option>
              <option value="8">Inglês</option>
              <option value="9">Matemática</option>
              <option value="10">Português</option>
            </select>
            <!-- --------------------------------------------FILTRO DISTRITO-------------------------------------------->
            <select
              class="form-select"
              aria-label="Default select example"
              id="FiltroDistrito"
            >
              <option selected>Todos os Distritos</option>
              <option value="1">Braga</option>
              <option value="2">Coimbra</option>
              <option value="3">Faro</option>
              <option value="3">Porto</option>
              <option value="3">Lisboa</option>
              <option value="3">Setúbal</option>
            </select>
            <!-- --------------------------------------------FILTRO CONCELHO-------------------------------------------->
            <select
              class="form-select"
              aria-label="Default select example"
              id="FiltroConcelho"
            >
              <option selected>Todos os Concelhos</option>
              <option value="3">Albufeira</option>
              <option value="1">Braga</option>
              <option value="3">Barcelos</option>
              <option value="3">Cantanhede</option>
              <option value="3">Cascais</option>
              <option value="3">Coimbra</option>
              <option value="3">Faro</option>
              <option value="3">Figueira da voz</option>
              <option value="3">Gondomar</option>
              <option value="3">Guimarães</option>
              <option value="2">Porto</option>
              <option value="3">Setúbal</option>
              <option value="3">Vila nova de Gaia</option>
              <option value="3">Loulé</option>
              <option value="3">Matosinhos</option>
              <option value="3">Montijo</option>
              <option value="3">Odivelas</option>
              <option value="3">Palmelas</option>
              <option value="3">Sintra</option>
              <option value="3">Lisboa</option>
            </select>
             <!-- --------------------------------------------FILTRO ESCOLA-------------------------------------------->
            <select
              class="form-select"
              aria-label="Default select example"
              id="FiltroEscola"
            >
              <option selected>Todos as Escolas</option>
              <option value="1">One</option>
              <option value="2">Two</option>
              <option value="3">Three</option>
            </select>
          </div>
        </div>
    </main>
